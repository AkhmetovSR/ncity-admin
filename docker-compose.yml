# docker-compose.yml
version: '3.8'

services:
  admin:
    build: .
    container_name: ncity-admin
    restart: unless-stopped
    ports:
      - "3001:3000" # Сеньор-фикс: хост-порт теперь 3001, внутри контейнера — 3000
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    env_file:
      - .env
