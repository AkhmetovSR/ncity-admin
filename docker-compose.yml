# Описываем список запускаемых сервисов (в нашем случае это один сервис админки)
services:

  # Название нашего сервиса внутри Docker Compose
  ncity-admin-app:

    # build: . указывает Докеру искать файл Dockerfile в текущей папке проекта.
    # При запуске контейнер будет компилировать Next.js приложение прямо на сервере.
    build: .

    # Стратегия перезапуска контейнера в случае падения или перезагрузки самого VPS.
    # always гарантирует, что если Next.js зависнет, Docker автоматически его поднимет.
    restart: always

    # Настройка проброса портов (Senior-изоляция).
    # Формат: "IP_СЕРВЕРА:ВНЕШНИЙ_ПОРТ:ВНУТРЕННИЙ_ПОРТ"
    # Внутри докера Next.js всегда слушает порт 3000.
    # Привязка к 127.0.0.1 (localhost сервера) закрывает этот порт от внешнего интернета.
    # Админка будет отвечать СТРОГО локальному Nginx по порту 3001, защищая код от сканеров.
    ports:
      - "127.0.0.1:3001:3000"

    # Переменные окружения (Environment Variables), которые будут «впрыснуты» внутрь приложения
    environment:
      # Строка подключения к базе данных. Хостом указано имя 'dbpg'.
      # Docker сам поймет, что это соседний контейнер PostgreSQL, и свяжет их по внутренней сети.
      DATABASE_URL: "postgresql://adm:Parol!@dbpg:5432/ncity_db"

      # Флаг production отключает логи разработки и заставляет Next.js работать на максимальной скорости.
      NODE_ENV: "production"

    # Подключаем данный контейнер к виртуальной сети Docker
    networks:
      - ncity-shared-network

# Описываем конфигурацию сетей
networks:
  # Название сети, которую использует это приложение
  ncity-shared-network:
    # external: true — важнейший флаг. Он говорит Докеру: «Эта сеть была создана
    # заранее вручную (командой docker network create). Не нужно создавать новую сеть,
    # просто подключи этот контейнер к уже существующему проводу, где сидит база dbpg».
    external: true
